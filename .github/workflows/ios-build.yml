name: Build iOS

on:
  workflow_dispatch:
  
permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Get npm cache directory
        id: npm-cache
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT
      
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      
      - name: Install dependencies
        run: npm install
      
      - name: Add iOS platform
        run: npx cap add ios
      
      - name: Sync iOS
        run: npx cap sync ios
      
      - name: Build iOS
        run: |
          cd ios/App
          xcodebuild -scheme App -configuration Debug -destination 'generic/platform=iOS Simulator' build
        env:
          CODE_SIGNING_ALLOWED: NO
      
      - name: Create IPA
        run: |
          cd ios/App
          xcodebuild -scheme App -configuration Debug -destination 'generic/platform=iOS Simulator' -archivePath app.xcarchive archive
          xcodebuild -exportArchive -archivePath app.xcarchive -exportPath ./output -exportOptionsPlist ExportOptions.plist
        env:
          CODE_SIGNING_ALLOWED: NO
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app.ipa
          path: ios/App/output/app.ipa
